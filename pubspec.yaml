name: tailors_erp
description: Tailor's ERP - real Firebase Android tailoring and garment management app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  shared_preferences: ^2.5.3
  crypto: ^3.0.6
  intl: ^0.20.2
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.4
  pdf: ^3.11.3
  printing: ^5.14.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
