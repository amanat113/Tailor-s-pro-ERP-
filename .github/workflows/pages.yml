name: Deploy Tailor ERP PWA

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required app files
        run: |
          test -f index.html || (echo "index.html missing" && exit 1)
          test -f styles.css || (echo "styles.css missing" && exit 1)
          test -f app.js || (echo "app.js missing" && exit 1)
          test -f manifest.json || (echo "manifest.json missing" && exit 1)
          test -f sw.js || (echo "sw.js missing" && exit 1)

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html styles.css app.js manifest.json sw.js .nojekyll _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
