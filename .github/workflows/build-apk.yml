name: Build Tailor's ERP Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create/repair Android project
        run: flutter create --platforms=android --project-name tailors_erp --org com.tailors .

      - name: Connect Firebase Android config if available
        shell: bash
        run: |
          mkdir -p android/app
          if [ -f "google-services.json" ]; then cp -f "google-services.json" android/app/google-services.json; fi
          if [ -f "google-services (1).json" ]; then cp -f "google-services (1).json" android/app/google-services.json; fi
          python3 - <<'PY'
          from pathlib import Path
          settings = Path('android/settings.gradle')
          app_gradle = Path('android/app/build.gradle')
          has_config = Path('android/app/google-services.json').exists()
          if has_config:
              text = settings.read_text()
              if 'com.google.gms.google-services' not in text:
                  text = text.replace(
                      'id "org.jetbrains.kotlin.android" version "2.2.21" apply false',
                      'id "org.jetbrains.kotlin.android" version "2.2.21" apply false\n    id "com.google.gms.google-services" version "4.4.3" apply false'
                  )
                  settings.write_text(text)
              text = app_gradle.read_text()
              if 'id "com.google.gms.google-services"' not in text:
                  text = text.replace('id "com.android.application"', 'id "com.android.application"\n    id "com.google.gms.google-services"')
                  app_gradle.write_text(text)
              print('Firebase config found and connected.')
          else:
              print('WARNING: google-services.json not found. APK will build, but real OTP will be blocked until config is added.')
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailors-erp-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
