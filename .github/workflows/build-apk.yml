name: Build Tailor's ERP Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter doctor
        run: flutter doctor -v

      - name: Create or repair Android project
        run: flutter create --platforms=android --project-name tailors_erp --org com.tailors --overwrite .

      - name: Force Android package name and permissions
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          package_name = "com.tailors.erp"
          app_groovy = Path("android/app/build.gradle")
          app_kts = Path("android/app/build.gradle.kts")
          manifest = Path("android/app/src/main/AndroidManifest.xml")

          if app_groovy.exists():
              text = app_groovy.read_text()
              text = re.sub(r'namespace\s+"[^"]+"', f'namespace "{package_name}"', text)
              text = re.sub(r'applicationId\s+"[^"]+"', f'applicationId "{package_name}"', text)
              app_groovy.write_text(text)
              print("Updated Groovy Android build file")

          if app_kts.exists():
              text = app_kts.read_text()
              text = re.sub(r'namespace\s*=\s*"[^"]+"', f'namespace = "{package_name}"', text)
              text = re.sub(r'applicationId\s*=\s*"[^"]+"', f'applicationId = "{package_name}"', text)
              app_kts.write_text(text)
              print("Updated Kotlin Android build file")

          if manifest.exists():
              text = manifest.read_text()
              text = text.replace('android:label="tailors_erp"', 'android:label="Tailor\'s ERP"')
              text = text.replace('android:label="Tailors_erp"', 'android:label="Tailor\'s ERP"')
              perms = [
                  '<uses-permission android:name="android.permission.INTERNET" />',
                  '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />'
              ]
              for perm in perms:
                  if perm not in text:
                      text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + perm, 1)
              if '<queries>' not in text:
                  text = text.replace('</manifest>', '''    <queries>
        <intent>
            <action android:name="android.intent.action.VIEW" />
            <data android:scheme="https" />
        </intent>
        <intent>
            <action android:name="android.intent.action.DIAL" />
            <data android:scheme="tel" />
        </intent>
    </queries>
</manifest>''')
              manifest.write_text(text)
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailors-erp-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
