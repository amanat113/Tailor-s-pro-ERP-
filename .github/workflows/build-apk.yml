name: Build Tailor's ERP Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter doctor
        run: flutter doctor -v

      - name: Create or repair Android project
        run: flutter create --platforms=android --project-name tailors_erp --org com.tailors --overwrite .

      - name: Connect Firebase Android config and package name
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android/app

          if [ -f "google-services.json" ]; then
            cp -f "google-services.json" android/app/google-services.json
          elif [ -f "google-services (1).json" ]; then
            cp -f "google-services (1).json" android/app/google-services.json
          else
            echo "Missing google-services.json at repo root. Upload Firebase config before building."
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path
          import re

          package_name = "com.tailors.erp"

          settings_groovy = Path("android/settings.gradle")
          settings_kts = Path("android/settings.gradle.kts")
          app_groovy = Path("android/app/build.gradle")
          app_kts = Path("android/app/build.gradle.kts")

          if not settings_groovy.exists() and not settings_kts.exists():
              raise SystemExit("No Android settings.gradle or settings.gradle.kts found after flutter create.")

          if not app_groovy.exists() and not app_kts.exists():
              raise SystemExit("No Android app build.gradle or build.gradle.kts found after flutter create.")

          if settings_groovy.exists():
              text = settings_groovy.read_text()
              if "com.google.gms.google-services" not in text:
                  text = text.replace(
                      'id "org.jetbrains.kotlin.android" version "2.2.21" apply false',
                      'id "org.jetbrains.kotlin.android" version "2.2.21" apply false\n    id "com.google.gms.google-services" version "4.4.3" apply false'
                  )
              settings_groovy.write_text(text)

          if settings_kts.exists():
              text = settings_kts.read_text()
              if "com.google.gms.google-services" not in text:
                  text = text.replace(
                      'id("org.jetbrains.kotlin.android") version "2.2.21" apply false',
                      'id("org.jetbrains.kotlin.android") version "2.2.21" apply false\n    id("com.google.gms.google-services") version "4.4.3" apply false'
                  )
              settings_kts.write_text(text)

          if app_groovy.exists():
              text = app_groovy.read_text()
              if "com.google.gms.google-services" not in text:
                  text = text.replace(
                      'id "com.android.application"',
                      'id "com.android.application"\n    id "com.google.gms.google-services"'
                  )
              text = re.sub(r'namespace\s+"[^"]+"', f'namespace "{package_name}"', text)
              text = re.sub(r'applicationId\s+"[^"]+"', f'applicationId "{package_name}"', text)
              app_groovy.write_text(text)

          if app_kts.exists():
              text = app_kts.read_text()
              if "com.google.gms.google-services" not in text:
                  text = text.replace(
                      'id("com.android.application")',
                      'id("com.android.application")\n    id("com.google.gms.google-services")'
                  )
              text = re.sub(r'namespace\s*=\s*"[^"]+"', f'namespace = "{package_name}"', text)
              text = re.sub(r'applicationId\s*=\s*"[^"]+"', f'applicationId = "{package_name}"', text)
              app_kts.write_text(text)

          print("Firebase config connected and Android package set to com.tailors.erp.")
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailors-erp-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
