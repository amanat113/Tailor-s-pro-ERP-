name: Build Tailor's ERP Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter doctor
        run: flutter doctor -v

      - name: Recreate clean Android project
        run: |
          rm -rf android
          flutter create --platforms=android --project-name tailors_erp --org com.tailors .

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK for testing
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailors-erp-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
