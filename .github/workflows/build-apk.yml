name: Build Tailor's ERP Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Repair Android project files
        run: flutter create --platforms=android --project-name tailors_erp --org com.tailors .

      - name: Connect Google services plugin
        run: |
          python3 - <<'PY'
          from pathlib import Path
          settings = Path('android/settings.gradle')
          app_gradle = Path('android/app/build.gradle')
          if settings.exists():
              text = settings.read_text()
              if 'com.google.gms.google-services' not in text:
                  text = text.replace('id "org.jetbrains.kotlin.android" version "2.2.21" apply false', 'id "org.jetbrains.kotlin.android" version "2.2.21" apply false\n    id "com.google.gms.google-services" version "4.4.3" apply false')
                  text = text.replace('id "org.jetbrains.kotlin.android" version "2.1.0" apply false', 'id "org.jetbrains.kotlin.android" version "2.1.0" apply false\n    id "com.google.gms.google-services" version "4.4.3" apply false')
              settings.write_text(text)
          if app_gradle.exists():
              text = app_gradle.read_text()
              if 'id "com.google.gms.google-services"' not in text:
                  text = text.replace('id "com.android.application"', 'id "com.android.application"\n    id "com.google.gms.google-services"')
              text = text.replace('applicationId "com.tailors.tailors_erp"', 'applicationId "com.tailors.erp"')
              text = text.replace('namespace "com.tailors.tailors_erp"', 'namespace "com.tailors.erp"')
              app_gradle.write_text(text)
          PY

      - name: Validate Firebase config
        run: |
          test -f android/app/google-services.json || (echo "Missing android/app/google-services.json. Upload Firebase config file before building." && exit 1)

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailors-erp-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
